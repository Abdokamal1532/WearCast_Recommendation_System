version: '3.8'

services:
  recommendation-api:
    build: .
    container_name: wearcast-recommendation-api
    command: python -m uvicorn src.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DB_CONNECTION_STRING=mssql+pyodbc://host.docker.internal/WearCastDb?driver=ODBC+Driver+17+for+SQL+Server&trusted_connection=yes&TrustServerCertificate=yes
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  recommendation-trainer:
    build: .
    container_name: wearcast-recommendation-trainer
    command: python src/trainer_job.py
    depends_on:
      - recommendation-api
    volumes:
      - .:/app
    environment:
      - DB_CONNECTION_STRING=mssql+pyodbc://host.docker.internal/WearCastDb?driver=ODBC+Driver+17+for+SQL+Server&trusted_connection=yes&TrustServerCertificate=yes
      - SYNC_INTERVAL_HOURS=6
      - RELOAD_URL=http://recommendation-api:8000/internal/reload
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
